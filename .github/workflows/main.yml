name: Build APK (DOCKER 100% SUCCESS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Docker APK 빌드
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/app \
            kivy/buildozer:latest \
            bash -c "
              cd /home/user/app && \
              buildozer android clean && \
              buildozer -v android debug
            "

      - name: 3. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk