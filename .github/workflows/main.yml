name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install buildozer kivy kivymd pillow

      - name: Build with Buildozer
        id: buildozer
        run: |
          # [제1원칙 사수] 서버에 강제 설정된 v27 NDK 관련 모든 환경 변수를 삭제하여 간섭을 차단합니다.
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # 빌드를 시작하고 실시간 로그를 build_log.txt에 기록합니다.
          buildozer android debug 2>&1 | tee build_log.txt
        continue-on-error: true

      - name: Upload APK on Success
        if: steps.buildozer.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5

      - name: Upload Error Log on Failure
        if: steps.buildozer.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: Build-Error-Log
          path: build_log.txt
          retention-days: 5
