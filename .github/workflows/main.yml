name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          # 전수 검사 결과 반영: Cython 0.29.33 강제 설치로 컴파일 오류 방지
          pip install Cython==0.29.33 buildozer kivy kivymd pillow

      - name: Build with Buildozer
        id: buildozer
        run: |
          # [환경 절연] 서버 기본 NDK v27 및 v29 변수를 모두 제거하여 r26b 충돌 방지
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # 실시간 로그 기록 및 빌드 수행
          buildozer android debug 2>&1 | tee build_log.txt
        continue-on-error: true

      - name: Upload Error Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Error-Log
          path: build_log.txt
          retention-days: 5

      - name: Upload APK on Success
        if: steps.buildozer.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5
