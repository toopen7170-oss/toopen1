name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          # 전수 검사 결과: r26b 환경 최적화 버전 고정
          pip install Cython==0.29.33 buildozer kivy kivymd pillow

      - name: Build with Buildozer
        run: |
          # [환경 정화]
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          
          # [물리적 강제 이식 로직]
          # 1. Buildozer SDK 작업 경로 생성
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. 서버의 정상 라이선스/부품을 Buildozer 폴더로 강제 복사 (aidl 실종 해결)
          cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          
          # 3. buildozer.spec 실시간 경로 동기화
          sed -i "s|^#\?android.sdk_path =.*|android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk|" buildozer.spec
          sed -i "s|^#\?android.accept_sdk_license =.*|android.accept_sdk_license = True|" buildozer.spec

          # [라이선스 해시 주입] build-tools 37 대응
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a63b6825ea9d5513f8e07f45a561f2210" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 보조 승인 및 빌드 실행
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses || true
          
          buildozer android debug

      - name: Upload APK on Success
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5
