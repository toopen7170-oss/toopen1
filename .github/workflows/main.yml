name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. Buildozer SDK 경로 정의
          BUILDOZER_SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          
          # 2. 라이선스 자동 승인 (이전 성공 로직 유지)
          mkdir -p "$BUILDOZER_SDK_DIR/licenses"
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd\n49a384c23f413f170d10b002447171d9d435017a" > "$BUILDOZER_SDK_DIR/licenses/android-sdk-license"
          
          # 3. [긴급 수리] sdkmanager 경로 강제 동기화
          # 시스템의 최신 도구를 Buildozer가 찾는 구형 경로로 강제 복사합니다.
          mkdir -p "$BUILDOZER_SDK_DIR/tools/bin"
          SYS_SDK_MGR="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SYS_SDK_MGR" ]; then
            cp "$SYS_SDK_MGR" "$BUILDOZER_SDK_DIR/tools/bin/sdkmanager"
            chmod +x "$BUILDOZER_SDK_DIR/tools/bin/sdkmanager"
          fi

          # 4. 빌드 수행 (이제 경로를 찾을 수 있습니다)
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
