name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. SDK 경로 확보
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/licenses"
          
          # 2. [오류 정밀 타격] 라이선스 파일에 모든 승인 해시값을 수동으로 박아 넣습니다.
          # 이제 서버는 "Accept? (y/N)"을 묻지 않고 라이선스가 이미 통과된 것으로 간주합니다.
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd\n49a384c23f413f170d10b002447171d9d435017a" > "$SDK_DIR/licenses/android-sdk-license"
          
          # 3. [핵심 수리] Build-tools 37 오류를 피하기 위해 안정적인 34 버전으로 강제 세팅
          # spec 파일의 설정을 빌드 직전에 명령어로 가로채서 수정합니다.
          sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 34.0.0/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = 1/' buildozer.spec

          # 4. 권한 및 경로 동기화 (aidl 찾기 오류 방지)
          sudo chmod -R 777 /usr/local/lib/android/sdk || true
          
          # 5. 빌드 실행
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
