name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. Buildozer SDK 기반 경로 미리 생성
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/tools/bin"
          mkdir -p "$SDK_DIR/licenses"
          
          # 2. [라이선스 사수] 이미 성공한 라이선스 승인 파일을 다시 한번 고착화
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722" > "$SDK_DIR/licenses/android-sdk-license"
          
          # 3. [핵심 수리] 엇갈린 sdkmanager 경로를 강제로 연결
          # 시스템의 최신 sdkmanager를 Buildozer가 찾는 'tools/bin' 위치로 연결합니다.
          SYS_SDK_MGR=$(find /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager | head -n 1)
          if [ -n "$SYS_SDK_MGR" ]; then
            ln -sf "$SYS_SDK_MGR" "$SDK_DIR/tools/bin/sdkmanager"
          fi
          
          # 4. 권한 부여 및 빌드 환경 고정
          sudo chmod -R 777 /usr/local/lib/android/sdk || true
          export ANDROID_HOME=$SDK_DIR
          
          # 5. 빌드 수행
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
