name: Build APK (DOCKER NON-ROOT FINAL)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Docker APK 빌드 (non-root 실행)
        run: |
          docker run --rm \
            -u $(id -u):$(id -g) \
            -v ${{ github.workspace }}:/home/user/app \
            -w /home/user/app \
            kivy/buildozer:latest \
            buildozer android clean debug

      - name: 3. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk