name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev autoconf automake libtool
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. 시스템 SDK를 Buildozer 경로로 선제 연결
          # Buildozer가 스스로 내려받다가 실패하는 것을 막기 위해 시스템 SDK를 링크합니다.
          mkdir -p ~/.buildozer/android/platform
          ln -sf /usr/local/lib/android/sdk ~/.buildozer/android/platform/android-sdk
          
          # 2. 라이선스 강제 동의 (모든 해시값 주입)
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 3. [핵심 수리] 환경 변수 강제 고정
          # Buildozer가 내부적으로 작동할 때 시스템의 도구를 우선적으로 사용하게 합니다.
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:/usr/local/lib/android/sdk/cmdline-tools/latest/bin:/usr/local/lib/android/sdk/platform-tools
          
          # 4. 권한 부여 후 빌드
          sudo chmod -R 777 /usr/local/lib/android/sdk || true
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
