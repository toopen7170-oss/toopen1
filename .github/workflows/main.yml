name: Build APK (FULL RESET FINAL)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Python 3.10 고정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 시스템 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev build-essential \
          libsqlite3-dev zlib1g-dev

    - name: Python 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install cython==0.29.33 buildozer

    - name: 🔥 완전 초기화 (기존 환경 삭제)
      run: |
        rm -rf ~/.buildozer
        rm -rf $HOME/android-sdk

    - name: 🔥 Android SDK 완전 재설치
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip tools.zip
        mv cmdline-tools latest

        mkdir -p $HOME/android-sdk/tools/bin
        ln -s $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager $HOME/android-sdk/tools/bin/sdkmanager

        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

        yes | sdkmanager --licenses

        # ❗ 절대 37 설치 안되게 34만 강제
        sdkmanager --install \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "ndk;25.2.9519653"

    - name: 🔥 환경 충돌 제거 + 빌드
      run: |
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        unset ANDROID_NDK

        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

        buildozer -v android debug

    - name: APK 업로드
      uses: actions/upload-artifact@v4
      with:
        name: FINAL-APK
        path: bin/*.apk