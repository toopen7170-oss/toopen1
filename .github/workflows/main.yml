name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow

      - name: Build with Buildozer
        run: |
          # 1. 환경 절연
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          
          # 2. [핵심 조치] Buildozer가 원하는 구형 경로를 물리적으로 생성하여 연결
          # Buildozer의 내부 작업 경로를 미리 만들고 최신 SDK를 매핑합니다.
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/tools/bin"
          
          # 시스템에 설치된 최신 sdkmanager를 구형 경로로 링크 (Buildozer 기만 로직)
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager" || true
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" "$SDK_DIR/tools/bin/avdmanager" || true

          # 3. buildozer.spec 강제 교정
          sed -i "s|^#\?android.sdk_path =.*|android.sdk_path = $SDK_DIR|" buildozer.spec
          sed -i "s|^#\?android.accept_sdk_license =.*|android.accept_sdk_license = True|" buildozer.spec

          # 4. 라이선스 주입 및 경로 확보
          mkdir -p "$SDK_DIR/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a63b6825ea9d5513f8e07f45a561f2210" > "$SDK_DIR/licenses/android-sdk-license"
          
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses || true
          
          # 빌드 실행
          buildozer android debug

      - name: Upload APK on Success
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5
