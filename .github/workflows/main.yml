name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # [핵심 수리] 시스템 SDK/NDK 경로 강제 주입 (가장 확실한 방법)
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          
          # 빌드 도구 실행 권한 전수 부여
          sudo chmod -R 777 /usr/local/lib/android/sdk/build-tools || true
          
          # 라이선스 자동 수락 및 빌드 환경 초기화
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | buildozer android licenses
          
          # 빌드 수행 (경로 탐색 오류 해결 버전)
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
