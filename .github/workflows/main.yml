name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # [환경 절연] NDK v27 간섭 차단 및 r26b 설정
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
          pip install --upgrade pip
          pip install buildozer kivy kivymd

      - name: Build with Buildozer
        id: buildozer
        run: |
          # 로그를 파일로 저장하도록 설정
          buildozer android debug 2>&1 | tee build_log.txt
        continue-on-error: true

      # [오류 보고 시스템] 빌드 실패 시 로그 파일 업로드 (Artifacts)
      - name: Upload Error Log on Failure
        if: steps.buildozer.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: Build-Error-Log
          path: build_log.txt
          retention-days: 5
