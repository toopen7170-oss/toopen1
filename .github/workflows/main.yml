name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          
          SDK_TARGET="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_TARGET/licenses"
          mkdir -p "$SDK_TARGET/build-tools/34.0.0"
          mkdir -p "$SDK_TARGET/platform-tools"
          mkdir -p "$SDK_TARGET/tools/bin"
          mkdir -p "$SDK_TARGET/cmdline-tools/latest/bin"
          
          # [핵심] 사용자 제공 모든 해시값 통합 주입
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\n2c06d49fab45057e65163b5dedf2902da9c62b36\n233cb74c0a8ecf4afb00fb1067afd74d239b26b1\nd56f5187479451eabf01fb7437c3550b3118b226" > "$SDK_TARGET/licenses/android-sdk-license"
          
          # [핵심] 구형(tools/bin) 및 신형(cmdline-tools) 경로 2중 제압
          REAL_AIDL=$(find $ANDROID_HOME -name aidl | head -n 1)
          REAL_SDKMAN=$(find $ANDROID_HOME -name sdkmanager | head -n 1)
          ln -sf "$REAL_AIDL" "$SDK_TARGET/build-tools/34.0.0/aidl"
          ln -sf "$REAL_SDKMAN" "$SDK_TARGET/tools/bin/sdkmanager"
          ln -sf "$REAL_SDKMAN" "$SDK_TARGET/cmdline-tools/latest/bin/sdkmanager"

          sed -i "s|^#\?android.sdk_path =.*|android.sdk_path = $ANDROID_HOME|" buildozer.spec
          sed -i "s|^#\?android.accept_sdk_license =.*|android.accept_sdk_license = True|" buildozer.spec
          
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Final-Build
          path: bin/*.apk
