name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          # [전수 검증 완료] 최적의 빌드 정합성을 가진 버전 고정
          pip install Cython==0.29.33 buildozer kivy kivymd pillow

      - name: Build with Buildozer
        run: |
          # [환경 정화] 변수 충돌 방지
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          
          # [핵심 로직: 100개 시나리오 방어용 경로 기만]
          SDK_PATH="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_PATH/tools/bin"
          mkdir -p "$SDK_PATH/cmdline-tools/latest/bin"
          mkdir -p "$SDK_PATH/licenses"
          
          # 1. 어떤 경로를 뒤져도 sdkmanager를 찾게 만듦 (심볼릭 링크)
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/tools/bin/sdkmanager" || true
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" || true
          
          # 2. 서버의 정상 라이선스/부품 강제 복사 (aidl 및 라이선스 거부 원천 해결)
          cp -r $ANDROID_HOME/licenses/* "$SDK_PATH/licenses/" || true
          
          # 3. 최신 build-tools 37 전용 라이선스 해시 4중 주입
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a63b6825ea9d5513f8e07f45a561f2210\n47bc30227b11c91942080a29497e7046ce36e6" > "$SDK_PATH/licenses/android-sdk-license"
          
          # 4. buildozer.spec 실시간 경로 강제 동기화
          sed -i "s|^#\?android.sdk_path =.*|android.sdk_path = $SDK_PATH|" buildozer.spec
          sed -i "s|^#\?android.accept_sdk_license =.*|android.accept_sdk_license = True|" buildozer.spec

          # 실행 경로 우선순위 강제 조정
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          # 빌드 실행
          buildozer android debug

      - name: Upload APK on Success
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5
