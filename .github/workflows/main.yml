name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. Buildozer가 사용할 SDK 기반 폴더 강제 생성
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/tools/bin"
          mkdir -p "$SDK_DIR/licenses"
          
          # 2. [라이선스 사수] 라이선스 승인 파일을 물리적으로 미리 생성
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_DIR/licenses/android-sdk-license"
          
          # 3. [핵심 수리] 시스템의 sdkmanager를 Buildozer가 찾는 구형 경로로 강제 복사
          # 'does not exist' 오류를 물리적으로 제거합니다.
          SYS_SDK_MGR=$(find /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager | head -n 1)
          if [ -n "$SYS_SDK_MGR" ]; then
            cp "$SYS_SDK_MGR" "$SDK_DIR/tools/bin/sdkmanager"
            chmod +x "$SDK_DIR/tools/bin/sdkmanager"
          fi

          # 4. [버전 고착] build-tools 37 오류를 피하기 위해 34 버전으로 spec 수정
          if [ -f "buildozer.spec" ]; then
            sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
            sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 34.0.0/' buildozer.spec
            sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = 1/' buildozer.spec
          fi

          # 5. 빌드 실행
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
