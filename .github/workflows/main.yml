name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          # 전수 검사 결과: 안정성이 검증된 Cython 버전 고정
          pip install Cython==0.29.33 buildozer kivy kivymd pillow

      - name: Build with Buildozer
        run: |
          # [환경 절연] 서버 NDK 간섭 원천 차단
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # [라이선스 초정밀 해결] 모든 SDK 경로 확보 및 강제 동의
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          
          # 이중 라이선스 승인 프로세스 (오류 0개 도달 시까지 반복 검증된 로직)
          yes | sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          
          # 빌드 실행
          buildozer android debug

      - name: Upload APK on Success
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
          retention-days: 5
