name: Build APK (DOCKER FIXED ROOT ISSUE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Docker APK 빌드 (root 자동 통과)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/app \
            kivy/buildozer:latest \
            bash -c "
              cd /home/user/app && \
              yes | buildozer android clean && \
              yes | buildozer -v android debug
            "

      - name: 3. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk