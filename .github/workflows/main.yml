name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. SDK 타겟 경로 설정
          SDK_TARGET="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_TARGET/licenses"
          
          # 2. [오류해결] 모든 라이선스 해시 주입 (Build-tools 37 포함)
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\n2c06d49fab45057e65163b5dedf2902da9c62b36\n233cb74c0a8ecf4afb00fb1067afd74d239b26b1\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722" > "$SDK_TARGET/licenses/android-sdk-license"
          
          # 3. [오류해결] Permission Denied 차단 (권한 강제 부여)
          chmod +x -R /usr/local/lib/android/sdk || true
          
          # 4. [오류해결] aidl 경로 물리적 고착
          mkdir -p "$SDK_TARGET/build-tools/34.0.0"
          REAL_AIDL=$(find /usr/local/lib/android/sdk -name aidl | head -n 1)
          if [ -f "$REAL_AIDL" ]; then
            ln -sf "$REAL_AIDL" "$SDK_TARGET/build-tools/34.0.0/aidl"
            chmod +x "$SDK_TARGET/build-tools/34.0.0/aidl"
          fi

          # 5. 빌드 실행
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Final
          path: bin/*.apk
