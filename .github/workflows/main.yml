name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. Buildozer가 사용할 SDK 경로 강제 생성
          SDK_PATH="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_PATH/cmdline-tools/latest"
          mkdir -p "$SDK_PATH/licenses"

          # 2. [오류 해결의 핵심] 시스템에 있는 최신 도구를 Buildozer 경로로 복사
          # Buildozer가 스스로 다운로드하다가 라이선스에서 멈추는 것을 방지합니다.
          cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/* "$SDK_PATH/cmdline-tools/latest/"

          # 3. [라이선스 강제 승인] 모든 해시값을 파일로 직접 박아넣습니다.
          # 37.0.0 버전까지 포함된 최신 라이선스 해시입니다.
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722" > "$SDK_PATH/licenses/android-sdk-license"
          
          # 4. sdkmanager를 실행하여 다시 한번 모든 라이선스 전수 승인
          yes | "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_PATH" --licenses || true

          # 5. 빌드 수행
          # 이미 라이선스가 승인되었으므로 Aidl을 찾는 과정에서 멈추지 않습니다.
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
