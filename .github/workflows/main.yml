name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # [철갑 경로 고착 로직]
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          
          # Buildozer가 생성할 예정인 경로를 미리 선점하여 실제 SDK와 연결
          SDK_TARGET="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_TARGET/licenses"
          mkdir -p "$SDK_TARGET/tools/bin"
          mkdir -p "$SDK_TARGET/cmdline-tools/latest/bin"
          
          # 라이선스 및 바이너리 강제 이식 (오류 0개 고착)
          cp -r $ANDROID_HOME/licenses/* "$SDK_TARGET/licenses/" || true
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226" > "$SDK_TARGET/licenses/android-sdk-license"
          
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$SDK_TARGET/tools/bin/sdkmanager" || true
          ln -s "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$SDK_TARGET/cmdline-tools/latest/bin/sdkmanager" || true
          ln -s "$ANDROID_HOME/platform-tools/aidl" "$SDK_TARGET/platform-tools/aidl" || true

          # spec 파일 실시간 경로 수정
          sed -i "s|^#\?android.sdk_path =.*|android.sdk_path = $ANDROID_HOME|" buildozer.spec
          sed -i "s|^#\?android.accept_sdk_license =.*|android.accept_sdk_license = True|" buildozer.spec
          
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Final
          path: bin/*.apk
