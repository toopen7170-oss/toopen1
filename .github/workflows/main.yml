name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. SDK 경로 및 라이선스 폴더 생성
          SDK_TARGET="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_TARGET/licenses"
          
          # 2. [라이선스 제압] 모든 해시값 전수 주입 (Build-tools 37 포함)
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\n2c06d49fab45057e65163b5dedf2902da9c62b36\n233cb74c0a8ecf4afb00fb1067afd74d239b26b1\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722" > "$SDK_TARGET/licenses/android-sdk-license"
          
          # 3. [권한 오류 원천 차단] 시스템 SDK에 미리 권한 부여
          sudo chmod +x -R /usr/local/lib/android/sdk || true
          
          # 4. [환경 고착] aidl 링크 생성 시 sudo 권한 강제 집행
          # 'Operation not permitted' 오류를 방어하기 위해 sudo를 사용합니다.
          mkdir -p "$SDK_TARGET/build-tools/34.0.0"
          REAL_AIDL=$(find /usr/local/lib/android/sdk -name aidl | head -n 1)
          if [ -n "$REAL_AIDL" ]; then
            sudo ln -sf "$REAL_AIDL" "$SDK_TARGET/build-tools/34.0.0/aidl"
            sudo chmod 777 "$SDK_TARGET/build-tools/34.0.0/aidl" || true
          fi

          # 5. 빌드 실행
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Final-Build
          path: bin/*.apk
