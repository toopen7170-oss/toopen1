name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev
          pip install --upgrade pip
          pip install buildozer kivy kivymd pillow

      - name: Build with Buildozer
        id: buildozer
        run: |
          # [환경 절연 초강력 조치] 서버에 등록된 모든 NDK 관련 변수를 완전히 소거합니다.
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # 빌드 실행 및 모든 로그를 파일로 기록
          buildozer android debug 2>&1 | tee build_log.txt
        continue-on-error: true

      # [무결성 보장] 빌드 성공 여부와 상관없이 무조건 로그 파일을 업로드합니다.
      - name: Upload Error Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Error-Log
          path: build_log.txt
          retention-days: 5

      - name: Upload APK on Success
        if: steps.buildozer.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: RPG-Manager-APK
          path: bin/*.apk
