name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. Buildozer가 SDK를 설치할 경로를 미리 정의
          BUILDOZER_SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$BUILDOZER_SDK_DIR/licenses"
          
          # 2. [오류 정밀 타격] 모든 버전(37 포함)의 라이선스 승인 해시값을 직접 주입
          # 이 파일이 있으면 서버는 더 이상 "Accept? (y/N)"을 묻지 않습니다.
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd\n49a384c23f413f170d10b002447171d9d435017a" > "$BUILDOZER_SDK_DIR/licenses/android-sdk-license"
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n50466765fdc03f962884445487f47491075771fb" > "$BUILDOZER_SDK_DIR/licenses/android-sdk-preview-license"
          
          # 3. 시스템 SDK에서도 라이선스를 미리 승인 (이중 보안)
          yes | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 4. 빌드 수행
          # 로그를 상세히 보기 위해 -v 옵션을 유지합니다.
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
