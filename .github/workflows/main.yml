name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: Build with Buildozer
        run: |
          # 1. 시스템 SDK 경로 고착
          export ANDROID_HOME=$ANDROID_HOME
          
          # 2. [오류해결] Buildozer 명령어 대신 sdkmanager로 직접 라이선스 승인
          # 'Unknown command licenses' 오류를 원천 차단합니다.
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 3. 권한 강제 부여 (Permission denied 방어)
          sudo chmod -R 777 /usr/local/lib/android/sdk || true
          
          # 4. 빌드 수행
          # --profile을 제거하고 가장 표준적인 디버그 빌드를 진행합니다.
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Build
          path: bin/*.apk
